<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Retail Shop</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            padding:40px 5%;
            color:white;
        }

        .title{
            text-align:center;
            margin-bottom:40px;
        }

        .title h1{
            font-size:3rem;
            color:#38bdf8;
            margin-bottom:10px;
        }

        .title p{
            color:#cbd5e1;
            font-size:1rem;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:30px;
        }

        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:20px;
            transition:0.4s ease;
            cursor:pointer;
            border:2px solid transparent;
            box-shadow:0 10px 25px rgba(0,0,0,0.4);
        }

        .gallery img:hover{
            transform:translateY(-10px) scale(1.02);
            border-color:#38bdf8;
            box-shadow:0 0 25px rgba(56,189,248,0.5);
        }

        @media(max-width:768px){

            body{
                padding:20px;
            }

            .title h1{
                font-size:2rem;
            }

            .gallery{
                gap:20px;
            }

            .gallery img{
                height:220px;
            }
        }

    </style>

</head>
<body>

    <div class="title">
        <h1>AK Retail Shop</h1>
        <p>Modern Retail Management Project Screenshots</p>
    </div>

    <div class="gallery">

        <img src="/akportfolio/assert/akreatailshop/1.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/2.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/3.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/4.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/5.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/6.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/7.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/8.png" alt="">
        <img src="/akportfolio/assert/akreatailshop/9.png" alt="">

    </div>

</body>
</html>
